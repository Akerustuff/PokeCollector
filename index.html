<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#CC0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokeDex">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PokeDex Coleccion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#CC0000;--red-dark:#8B0000;--yellow:#FFCC00;--yellow-dark:#E6A800;--dark:#1A1A1A;--gray-100:#F0F0F0;--gray-200:#DEDEDE;--gray-400:#999;--gray-700:#444;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#1A1A1A;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:linear-gradient(160deg,var(--red-dark) 0%,var(--red) 55%,#DD2222 100%);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.pokeball{width:40px;height:40px;border-radius:50%;background:linear-gradient(180deg,#fafafa 50%,#1a1a1a 50%);border:3px solid #1a1a1a;position:relative;flex-shrink:0}
.pokeball::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:white;border:2.5px solid #1a1a1a;z-index:1}
.pokeball::after{content:'';position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:3px;background:#1a1a1a}
.logo-text{font-family:'Bangers',cursive;font-size:30px;color:var(--yellow);letter-spacing:1px;text-shadow:2px 2px 0 rgba(0,0,0,.35);line-height:1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#44DD44;box-shadow:0 0 6px #44DD44;transition:all .3s;flex-shrink:0}
.sync-dot.syncing{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation:pulse .6s infinite alternate}
.sync-dot.error{background:#FF4444;box-shadow:0 0 6px #FF4444;animation:none}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.stats-badge{background:rgba(0,0,0,.35);border-radius:20px;padding:6px 14px;text-align:center;border:1px solid rgba(255,255,255,.15)}
.stats-number{font-family:'Bangers',cursive;font-size:20px;color:var(--yellow);line-height:1}
.stats-label{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-input{flex:1;padding:10px 16px;border-radius:30px;border:2px solid transparent;background:rgba(255,255,255,.15);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:all .2s}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{background:rgba(255,255,255,.25);border-color:var(--yellow)}
.btn-filter{padding:10px 14px;border-radius:30px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-filter.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow-dark)}
.gen-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.gen-tabs::-webkit-scrollbar{display:none}
.gen-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.1);border:2px solid transparent;color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.gen-tab.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow-dark)}

/* CONTENT */
.content{padding:16px;background:var(--gray-100);min-height:calc(100vh - 180px)}
.gen-section{margin-bottom:24px}
.gen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gen-title{font-family:'Bangers',cursive;font-size:22px;color:var(--red);letter-spacing:1px}
.gen-title span{font-family:'Nunito',sans-serif;font-size:12px;color:var(--gray-400);font-weight:700;margin-left:8px}
.gen-progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:80px;height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow));border-radius:4px;transition:width .4s ease}
.gen-count{font-size:12px;font-weight:700;color:var(--gray-700)}
.pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}

/* POKEMON CARD */
.pokemon-card{background:white;border-radius:var(--radius);padding:28px 6px 8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;border:2.5px solid transparent;transition:border-color .2s,background .2s;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.07);user-select:none}
.pokemon-card.collected{border-color:var(--yellow-dark);background:linear-gradient(135deg,#FFFDE7,#FFF8C4)}
.pokemon-card.form{border-style:dashed;border-color:#ccc}
.pokemon-card.form.collected{border-style:solid;border-color:var(--yellow-dark)}
.pokemon-card.regional{border-color:#aaa;border-style:dashed}
.pokemon-card.regional.collected{border-color:var(--yellow-dark);border-style:solid}
@keyframes syncFlicker{0%{box-shadow:0 0 0 0 rgba(255,204,0,0)}30%{box-shadow:0 0 0 6px rgba(255,204,0,.7)}100%{box-shadow:0 0 0 0 rgba(255,204,0,0)}}
.pokemon-card.synced-in{animation:syncFlicker .9s ease-out}

/* Card body (clickeable para abrir modal) */
.card-body{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:0}
.card-body:active{opacity:.7}

/* Check button — esquina superior izquierda */
.check-btn{position:absolute;top:5px;left:5px;width:24px;height:24px;border-radius:7px;border:2px solid var(--gray-200);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;transition:background .15s,border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent;font-size:13px;font-weight:900;color:transparent;line-height:1}
.check-btn:active{transform:scale(.82)}
.pokemon-card.collected .check-btn{background:var(--red);border-color:var(--red-dark);color:white}

/* TCG badge — esquina superior derecha */
.card-icon{position:absolute;top:5px;right:6px;font-size:11px;line-height:1;pointer-events:none;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}

.pokemon-img{width:54px;height:54px;image-rendering:pixelated;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));pointer-events:none}
.pokemon-card:not(.collected) .pokemon-img{filter:grayscale(.4) opacity(.6)}
.pokemon-number{font-size:10px;color:var(--gray-400);font-weight:700;letter-spacing:.5px;pointer-events:none}
.pokemon-name{font-size:11px;font-weight:700;color:var(--dark);text-align:center;text-transform:capitalize;line-height:1.2;pointer-events:none}
.form-label{font-size:9px;color:var(--gray-400);text-align:center;font-weight:600;line-height:1.1;pointer-events:none}

/* UTILS */
.loading{display:flex;justify-content:center;align-items:center;padding:80px;gap:10px}
.lb{width:14px;height:14px;border-radius:50%;background:var(--red);animation:bounce .7s infinite alternate}
.lb:nth-child(2){animation-delay:.15s;background:var(--yellow)}
.lb:nth-child(3){animation-delay:.3s}
@keyframes bounce{from{transform:translateY(0);opacity:.5}to{transform:translateY(-18px);opacity:1}}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state p{font-weight:700;font-size:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:10px 22px;border-radius:30px;font-weight:700;font-size:14px;z-index:2000;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.section-divider{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:1px;text-transform:uppercase;padding:8px 0 6px;margin-top:10px;border-top:1px dashed var(--gray-200)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#181818;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding-bottom:max(env(safe-area-inset-bottom,0px),16px);box-shadow:0 -8px 40px rgba(0,0,0,.7);border-top:1px solid rgba(255,255,255,.07);animation:sheetUp .28s cubic-bezier(.32,.72,0,1);overflow:hidden;will-change:transform}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 0}
.modal-header{display:flex;align-items:center;gap:14px;padding:14px 18px 0}
.modal-sprite{width:72px;height:72px;image-rendering:pixelated;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));flex-shrink:0}
.modal-title-wrap{flex:1}
.modal-poke-num{font-size:11px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1px}
.modal-poke-name{font-family:'Bangers',cursive;font-size:26px;color:var(--yellow);letter-spacing:1px;line-height:1}
.modal-poke-form{font-size:11px;color:rgba(255,255,255,.45);font-weight:700;margin-top:2px}
.modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.modal-close:active{background:rgba(255,255,255,.2)}
.modal-divider{height:1px;background:rgba(255,255,255,.07);margin:14px 0 0}
.modal-actions{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.modal-collect-btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.modal-collect-btn:active{transform:scale(.97)}
.modal-collect-btn.add{background:var(--yellow);color:var(--dark)}
.modal-collect-btn.remove{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12)}

/* Seccion carta */
.modal-card-section{background:rgba(255,255,255,.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.08)}
.modal-card-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px}
.card-saved-view{display:flex;align-items:flex-start;gap:12px}
.card-saved-thumb{width:52px;height:72px;border-radius:6px;object-fit:cover;box-shadow:0 4px 14px rgba(0,0,0,.5);flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-saved-info{flex:1;min-width:0}
.card-saved-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.8)}
.card-saved-sub{font-size:10px;color:rgba(255,255,255,.35);font-weight:600;margin-top:2px}
.card-saved-btns{display:flex;gap:6px;margin-top:8px}
.card-mini-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.card-mini-btn:active{opacity:.7}
.card-mini-btn.view{background:rgba(255,204,0,.15);color:var(--yellow)}
.card-mini-btn.change{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.card-mini-btn.del{background:rgba(255,60,60,.1);color:rgba(255,100,100,.8)}
.card-url-wrap{display:flex;gap:8px;align-items:stretch}
.card-url-input{flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;min-width:0}
.card-url-input::placeholder{color:rgba(255,255,255,.25)}
.card-url-input:focus{border-color:var(--yellow)}
.card-url-save{padding:10px 14px;border-radius:10px;border:none;background:var(--yellow);color:var(--dark);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.card-url-save:active{opacity:.8}
.card-url-hint{font-size:10px;color:rgba(255,255,255,.25);margin-top:6px;font-weight:600}

/* VISOR CARTA */
.card-viewer-overlay{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);align-items:center;justify-content:center;flex-direction:column;padding:24px 20px;gap:20px}
.card-viewer-overlay.open{display:flex}
.card-viewer-img{max-width:min(300px,84vw);max-height:70dvh;border-radius:14px;object-fit:contain;box-shadow:0 20px 70px rgba(0,0,0,.9);animation:cardPop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.card-viewer-close{padding:12px 32px;border-radius:30px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="pokeball"></div>
      <div>
        <div class="logo-text">PokeCol</div>
        <div class="logo-sub">Coleccion compartida</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <div class="stats-badge">
        <div class="stats-number" id="global-count">-- / --</div>
        <div class="stats-label">Capturados</div>
      </div>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" type="search" id="search" placeholder="Buscar Pokemon..." autocomplete="off">
    <button class="btn-filter" id="btn-missing">Faltan</button>
    <button class="btn-filter" id="btn-mark-all">Todos</button>
  </div>
  <div class="gen-tabs" id="gen-tabs">
    <div class="gen-tab active" data-gen="all">Todos</div>
  </div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="lb"></div><div class="lb"></div><div class="lb"></div></div>
</div>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <img class="modal-sprite" id="modal-sprite" src="" alt="">
      <div class="modal-title-wrap">
        <div class="modal-poke-num"  id="modal-poke-num"></div>
        <div class="modal-poke-name" id="modal-poke-name"></div>
        <div class="modal-poke-form" id="modal-poke-form"></div>
      </div>
      <button class="modal-close" id="modal-close">X</button>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-actions">
      <button class="modal-collect-btn add" id="modal-collect-btn">
        <span id="modal-collect-icon">+</span>
        <span id="modal-collect-text">Marcar como capturado</span>
      </button>
      <div class="modal-card-section">
        <div class="modal-card-label">Mi carta TCG</div>
        <div id="modal-card-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- VISOR CARTA -->
<div class="card-viewer-overlay" id="card-viewer-overlay">
  <img class="card-viewer-img" id="card-viewer-img" src="" alt="Carta TCG">
  <button class="card-viewer-close" id="card-viewer-close">Cerrar</button>
</div>

// STATE
let collected=new Set(), tcgCards={}, allPokemon=[], nameCache={};
let activeGen='all', filterMissing=false, searchQuery='', isLocalChange=false;
let modalPoke=null;

// TOAST & SYNC
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}
function setSyncState(s){document.getElementById('sync-dot').className='sync-dot'+(s!=='ok'?' '+s:'')}

// FIRESTORE
async function saveAll(){setSyncState('syncing');try{await setDoc(colRef,{ids:[...collected],tcg:tcgCards});setSyncState('ok')}catch(e){setSyncState('error');console.error(e)}}
function loadFromSnap(data){collected=new Set(data.ids||[]);tcgCards=data.tcg||{}}

function startListener(){
  onSnapshot(colRef,snap=>{
    if(!snap.exists()){setSyncState('ok');return}
    if(isLocalChange){isLocalChange=false;return}
    const data=snap.data();
    const prev=new Set(collected);
    const prevTcg=JSON.stringify(tcgCards);
    loadFromSnap(data);
    const added=[...collected].filter(id=>!prev.has(id));
    const removed=[...prev].filter(id=>!collected.has(id));
    patchCards(added,removed);
    if(JSON.stringify(tcgCards)!==prevTcg)renderContent();
    updateGlobalCount();updateAllGenProgress();
    if(added.length+removed.length>0)showToast('Tu pareja actualizo '+( added.length+removed.length)+' Pokemon');
    setSyncState('ok');
  },err=>{setSyncState('error');console.error(err)});
}

function patchCards(added,removed){
  for(const id of added){const c=document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);if(c){c.classList.add('collected');c.querySelector('.check-btn').textContent='v';c.classList.remove('synced-in');void c.offsetWidth;c.classList.add('synced-in')}}
  for(const id of removed){const c=document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);if(c){c.classList.remove('collected');c.querySelector('.check-btn').textContent='';c.classList.remove('synced-in');void c.offsetWidth;c.classList.add('synced-in')}}
}

// NAMES
const NAMES_KEY='pokedex_names_es_v2';
async function fetchName(id){if(nameCache[id])return nameCache[id];try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);const d=await r.json();const es=d.names.find(n=>n.language.name==='es');return es?es.name:d.name}catch{return '#'+id}}

// BUILD LIST
// allPokemon entries have: id, name, gen, sprite, formLabel, type
// type: 'base' | 'family' | 'regional' | 'hisui'
// baseId: for family forms, the dex number of the parent (used to sort inline)
function buildPokemonList(){
  allPokemon=[];
  for(const gen of GENERATIONS){
    if(gen.id==='hisui'){
      // Hisui: only ALT_FORMS with type='hisui'
      for(const f of ALT_FORMS.filter(f=>f.type==='hisui'))
        allPokemon.push({id:f.key,name:f.name,gen:'hisui',sprite:f.sprite,formLabel:f.formLabel,type:'hisui',baseId:f.baseId});
    } else {
      // Base Pokemon for this gen
      for(let id=gen.range[0];id<=gen.range[1];id++){
        allPokemon.push({id:String(id),name:nameCache[id]||('#'+id),gen:gen.id,sprite:null,formLabel:'',type:'base',baseId:null});
        // Insert family forms right after their base
        for(const f of ALT_FORMS.filter(f=>f.type==='family'&&f.gen===gen.id&&f.baseId===String(id)))
          allPokemon.push({id:f.key,name:f.name,gen:gen.id,sprite:f.sprite,formLabel:f.formLabel,type:'family',baseId:f.baseId});
      }
      // Regional forms at the end of their gen
      for(const f of ALT_FORMS.filter(f=>f.type==='regional'&&f.gen===gen.id))
        allPokemon.push({id:f.key,name:f.name,gen:gen.id,sprite:f.sprite,formLabel:f.formLabel,type:'regional',baseId:f.baseId});
    }
  }
}

// GEN TABS
function buildGenTabs(){
  const container=document.getElementById('gen-tabs');
  container.innerHTML='<div class="gen-tab active" data-gen="all">Todos</div>';
  for(const gen of GENERATIONS){
    const tab=document.createElement('div');
    tab.className='gen-tab';
    tab.dataset.gen=gen.id;
    tab.textContent=gen.id==='hisui'?'Hisui':('Gen '+gen.id);
    container.appendChild(tab);
  }
  container.addEventListener('click',e=>{
    const tab=e.target.closest('.gen-tab');if(!tab)return;
    const raw=tab.dataset.gen;
    activeGen=raw==='all'?'all':(raw==='hisui'?'hisui':parseInt(raw));
    container.querySelectorAll('.gen-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');renderContent();
  });
}

// FILTER
function getFiltered(){
  let list=allPokemon;
  if(activeGen!=='all')list=list.filter(p=>String(p.gen)===String(activeGen));
  if(filterMissing)list=list.filter(p=>!collected.has(p.id));
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.formLabel&&p.formLabel.toLowerCase().includes(q))||String(p.id).includes(q))}
  return list;
}

// RENDER
function cardHTML(p){
  const spriteUrl=p.sprite||('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+p.id+'.png');
  const numLabel=!isNaN(p.id)?('#'+String(p.id).padStart(4,'0')):'';
  const isCol=collected.has(p.id);
  const hasTcg=!!tcgCards[p.id];
  const extraClass=(p.type==='family'?' form':(p.type==='regional'||p.type==='hisui')?' form regional':'');
  return '<div class="pokemon-card'+(isCol?' collected':'')+extraClass+'" data-id="'+p.id+'">'
    +'<button class="check-btn" data-action="check">'+(isCol?'v':'')+'</button>'
    +(hasTcg?'<div class="card-icon">&#127183;</div>':'')
    +'<div class="card-body" data-action="open">'
    +'<img class="pokemon-img" src="'+spriteUrl+'" alt="'+p.name+'" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>?</text></svg>'">'
    +(numLabel?'<div class="pokemon-number">'+numLabel+'</div>':'')
    +'<div class="pokemon-name">'+p.name+'</div>'
    +(p.formLabel?'<div class="form-label">'+p.formLabel+'</div>':'')
    +'</div></div>';
}

function renderContent(){
  const content=document.getElementById('content');
  const filtered=getFiltered();
  if(filtered.length===0){content.innerHTML='<div class="empty-state"><div class="ei">&#128269;</div><p>No se encontraron Pokemon</p></div>';updateGlobalCount();return}
  const byGen={};
  for(const p of filtered){
    if(!byGen[p.gen])byGen[p.gen]={main:[],regional:[]};
    if(p.type==='regional')byGen[p.gen].regional.push(p);
    else byGen[p.gen].main.push(p);
  }
  let html='';
  for(const gen of GENERATIONS){
    if(!byGen[gen.id])continue;
    const{main,regional}=byGen[gen.id];
    const all=[...main,...regional];
    const got=all.filter(p=>collected.has(p.id)).length;
    const pct=all.length?Math.round(got/all.length*100):0;
    html+='<div class="gen-section" data-gen="'+gen.id+'">'
      +'<div class="gen-header"><div class="gen-title">'+gen.name+'<span>'+gen.region+'</span></div>'
      +'<div class="gen-progress"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><span class="gen-count">'+got+'/'+all.length+'</span></div></div>'
      +'<div class="pokemon-grid">'+main.map(p=>cardHTML(p)).join('')+'</div>'
      +(regional.length?'<div class="section-divider">Variantes regionales</div><div class="pokemon-grid">'+regional.map(p=>cardHTML(p)).join('')+'</div>':'')
      +'</div>';
  }
  content.innerHTML=html;
  updateGlobalCount();
  attachClicks();
}


// CLICKS
function attachClicks(){
  const content=document.getElementById('content');
  content.addEventListener('click',async e=>{
    if(e.target.closest('[data-action="check"]')){
      e.stopPropagation();
      const card=e.target.closest('.pokemon-card');
      if(card)await toggleCollected(card);
      return;
    }
    if(e.target.closest('[data-action="open"]')){
      const card=e.target.closest('.pokemon-card');
      if(card){const poke=allPokemon.find(p=>p.id===card.dataset.id);if(poke)openModal(poke)}
      return;
    }
  });
}

async function toggleCollected(card){
  const id=card.dataset.id;
  const poke=allPokemon.find(p=>p.id===id);
  const name=poke?(poke.formLabel?poke.name+' ('+poke.formLabel+')':poke.name):id;
  isLocalChange=true;
  if(collected.has(id)){collected.delete(id);card.classList.remove('collected');card.querySelector('.check-btn').textContent='';showToast(name+' eliminado')}
  else{collected.add(id);card.classList.add('collected');card.querySelector('.check-btn').textContent='v';showToast(name+' capturado!')}
  if(filterMissing&&!collected.has(id))card.remove();
  updateGlobalCount();updateGenProgress(poke?.gen);
  await saveAll();
  if(modalPoke?.id===id)renderModalCollectBtn();
}

// MODAL
function openModal(poke){
  modalPoke=poke;
  const spriteUrl=poke.sprite||('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+poke.id+'.png');
  const numLabel=!isNaN(poke.id)?('#'+String(poke.id).padStart(4,'0')):'';
  document.getElementById('modal-sprite').src=spriteUrl;
  document.getElementById('modal-poke-num').textContent=numLabel;
  document.getElementById('modal-poke-name').textContent=poke.name;
  const formEl=document.getElementById('modal-poke-form');
  formEl.textContent=poke.formLabel||'';
  formEl.style.display=poke.formLabel?'':'none';
  renderModalCollectBtn();
  renderModalCardSection();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';modalPoke=null}

function renderModalCollectBtn(){
  if(!modalPoke)return;
  const isCol=collected.has(modalPoke.id);
  const btn=document.getElementById('modal-collect-btn');
  btn.className='modal-collect-btn '+(isCol?'remove':'add');
  document.getElementById('modal-collect-icon').textContent=isCol?'X':'+';
  document.getElementById('modal-collect-text').textContent=isCol?'Quitar de capturados':'Marcar como capturado';
}

function renderModalCardSection(){
  if(!modalPoke)return;
  const saved=tcgCards[modalPoke.id];
  const content=document.getElementById('modal-card-content');
  if(saved?.imageUrl){
    content.innerHTML='<div class="card-saved-view">'
      +'<img class="card-saved-thumb" id="card-thumb" src="'+saved.imageUrl+'" alt="Carta TCG" onerror="this.style.display=\'none\'">'
      +'<div class="card-saved-info">'
      +'<div class="card-saved-title">Carta guardada</div>'
      +'<div class="card-saved-sub">Toca la imagen para ampliarla</div>'
      +'<div class="card-saved-btns">'
      +'<button class="card-mini-btn view" id="card-btn-view">Ver</button>'
      +'<button class="card-mini-btn change" id="card-btn-change">Cambiar</button>'
      +'<button class="card-mini-btn del" id="card-btn-del">Quitar</button>'
      +'</div></div></div>';
    document.getElementById('card-thumb').addEventListener('click',()=>openCardViewer(saved.imageUrl));
    document.getElementById('card-btn-view').addEventListener('click',()=>openCardViewer(saved.imageUrl));
    document.getElementById('card-btn-change').addEventListener('click',()=>showUrlInput());
    document.getElementById('card-btn-del').addEventListener('click',async()=>{
      delete tcgCards[modalPoke.id];
      document.querySelector('.pokemon-card[data-id="'+CSS.escape(modalPoke.id)+'"] .card-icon')?.remove();
      isLocalChange=true;await saveAll();showToast('Carta eliminada');renderModalCardSection();
    });
  } else {
    showUrlInput(content);
  }
}

function showUrlInput(container){
  const content=container||document.getElementById('modal-card-content');
  content.innerHTML='<div class="card-url-wrap">'
    +'<input class="card-url-input" id="card-url-input" type="url" placeholder="https://... link a la imagen de la carta" autocomplete="off">'
    +'<button class="card-url-save" id="card-url-save">Guardar</button>'
    +'</div>'
    +'<div class="card-url-hint">Pega el link directo a la imagen de tu carta TCG</div>';
  document.getElementById('card-url-save').addEventListener('click',async()=>{
    const url=document.getElementById('card-url-input').value.trim();
    if(!url)return;
    tcgCards[modalPoke.id]={imageUrl:url};
    const gridCard=document.querySelector('.pokemon-card[data-id="'+CSS.escape(modalPoke.id)+'"]');
    if(gridCard&&!gridCard.querySelector('.card-icon')){const b=document.createElement('div');b.className='card-icon';b.textContent='🃏';gridCard.appendChild(b)}
    isLocalChange=true;await saveAll();showToast('Carta guardada!');renderModalCardSection();
  });
  document.getElementById('card-url-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('card-url-save').click()});
}

// VISOR CARTA
function openCardViewer(url){document.getElementById('card-viewer-img').src=url;document.getElementById('card-viewer-overlay').classList.add('open')}
document.getElementById('card-viewer-close').addEventListener('click',()=>document.getElementById('card-viewer-overlay').classList.remove('open'));
document.getElementById('card-viewer-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('card-viewer-overlay'))document.getElementById('card-viewer-overlay').classList.remove('open')});

// MODAL EVENTS
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal()});
document.getElementById('modal-collect-btn').addEventListener('click',async()=>{
  if(!modalPoke)return;
  const card=document.querySelector('.pokemon-card[data-id="'+CSS.escape(modalPoke.id)+'"]');
  if(card){await toggleCollected(card)}
  else{
    const id=modalPoke.id;const name=modalPoke.formLabel?modalPoke.name+' ('+modalPoke.formLabel+')':modalPoke.name;
    isLocalChange=true;
    if(collected.has(id)){collected.delete(id);showToast(name+' eliminado')}else{collected.add(id);showToast(name+' capturado!')}
    updateGlobalCount();updateGenProgress(modalPoke.gen);await saveAll();renderModalCollectBtn();
  }
});

// Swipe down to close modal
{
  const sheet=document.getElementById('modal-sheet');
  let sy=0,swiping=false;
  sheet.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;swiping=false},{passive:true});
  sheet.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy;if(dy>10){swiping=true;sheet.style.transform='translateY('+dy*.5+'px)';sheet.style.transition='none'}},{passive:true});
  sheet.addEventListener('touchend',e=>{sheet.style.transition='';sheet.style.transform='';if(swiping&&(e.changedTouches[0].clientY-sy)>80)closeModal();swiping=false},{passive:true});
}

// PROGRESS
function updateGlobalCount(){const got=allPokemon.filter(p=>collected.has(p.id)).length;document.getElementById('global-count').textContent=got+' / '+allPokemon.length}
function updateGenProgress(genId){
  if(!genId)return;
  const section=document.querySelector('.gen-section[data-gen="'+genId+'"]');if(!section)return;
  const cards=section.querySelectorAll('.pokemon-card');
  const got=section.querySelectorAll('.pokemon-card.collected').length;
  const pct=cards.length?Math.round(got/cards.length*100):0;
  const fill=section.querySelector('.progress-fill');const cnt=section.querySelector('.gen-count');
  if(fill)fill.style.width=pct+'%';if(cnt)cnt.textContent=got+'/'+cards.length;
}
function updateAllGenProgress(){for(const g of GENERATIONS)updateGenProgress(g.id)}

// SEARCH & FILTERS
document.getElementById('search').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  if(searchQuery){activeGen='all';document.querySelectorAll('.gen-tab').forEach(t=>t.classList.remove('active'));document.querySelector('.gen-tab[data-gen="all"]')?.classList.add('active')}
  renderContent();
});
document.getElementById('btn-missing').addEventListener('click',e=>{filterMissing=!filterMissing;e.target.classList.toggle('active',filterMissing);renderContent()});
document.getElementById('btn-mark-all').addEventListener('click',async e=>{
  const filtered=getFiltered();const allMarked=filtered.every(p=>collected.has(p.id));
  if(allMarked){filtered.forEach(p=>collected.delete(p.id));showToast(filtered.length+' Pokemon desmarcados');e.target.textContent='Todos'}
  else{filtered.forEach(p=>collected.add(p.id));showToast(filtered.length+' Pokemon marcados');e.target.textContent='Ninguno'}
  isLocalChange=true;renderContent();await saveAll();
});

// INIT
async function init(){
  try{nameCache=JSON.parse(localStorage.getItem(NAMES_KEY)||'{}')}catch{}
  try{const snap=await getDoc(colRef);if(snap.exists())loadFromSnap(snap.data())}catch(e){console.error(e);setSyncState('error')}
  buildPokemonList();buildGenTabs();renderContent();startListener();setSyncState('ok');
  const missing=allPokemon.filter(p=>!p.isForm&&!nameCache[p.id]).map(p=>parseInt(p.id)).filter(Boolean);
  if(missing.length>0){
    const BATCH=15;
    for(let i=0;i<missing.length;i+=BATCH){
      const batch=missing.slice(i,i+BATCH);
      await Promise.all(batch.map(async id=>{
        const name=await fetchName(id);nameCache[id]=name;
        const entry=allPokemon.find(p=>p.id===String(id));if(entry)entry.name=name;
        const el=document.querySelector('.pokemon-card[data-id="'+id+'"] .pokemon-name');if(el)el.textContent=name;
      }));
      localStorage.setItem(NAMES_KEY,JSON.stringify(nameCache));
    }
  }
}
init();
</script>
