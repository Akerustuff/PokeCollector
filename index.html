<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#CC0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokeDex">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PokeDex Coleccion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#CC0000;--red-dark:#8B0000;--yellow:#FFCC00;--yellow-dark:#E6A800;--dark:#1A1A1A;--gray-100:#F0F0F0;--gray-200:#DEDEDE;--gray-400:#999;--gray-700:#444;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#1A1A1A;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:linear-gradient(160deg,var(--red-dark) 0%,var(--red) 55%,#DD2222 100%);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.pokeball{width:40px;height:40px;border-radius:50%;background:linear-gradient(180deg,#fafafa 50%,#1a1a1a 50%);border:3px solid #1a1a1a;position:relative;flex-shrink:0}
.pokeball::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:white;border:2.5px solid #1a1a1a;z-index:1}
.pokeball::after{content:'';position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:3px;background:#1a1a1a}
.logo-text{font-family:'Bangers',cursive;font-size:30px;color:var(--yellow);letter-spacing:1px;text-shadow:2px 2px 0 rgba(0,0,0,.35);line-height:1}
.logo-sub{font-size:9px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:1px;font-family:monospace}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#44DD44;box-shadow:0 0 5px #44DD44;transition:all .3s}
.sync-dot.syncing{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation:pulse .6s infinite alternate}
.sync-dot.error{background:#FF4444;box-shadow:0 0 6px #FF4444;animation:none}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.stats-badge{background:rgba(0,0,0,.35);border-radius:20px;padding:5px 10px;text-align:center;border:1px solid rgba(255,255,255,.15);min-width:0;max-width:90px}
.stats-number{font-family:'Bangers',cursive;font-size:clamp(13px,4vw,18px);color:var(--yellow);line-height:1;white-space:nowrap;overflow:hidden;width:100%;display:block}
.stats-label{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-input{flex:1;padding:10px 16px;border-radius:30px;border:2px solid transparent;background:rgba(255,255,255,.15);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:all .2s}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{background:rgba(255,255,255,.25);border-color:var(--yellow)}
.menu-btn{width:42px;height:42px;border-radius:24px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.menu-btn.active{background:var(--yellow);border-color:var(--yellow-dark)}
.menu-dropdown{display:none;flex-direction:column;position:absolute;top:50px;right:0;background:#1E1E1E;border:1px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden;width:200px;z-index:200}
.menu-dropdown.open{display:flex}
.menu-dropdown .menu-item{display:flex;align-items:center;gap:10px;padding:13px 14px;color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.menu-item:active{background:rgba(255,255,255,.06)}
.menu-item.active{color:#FFCC00}
.menu-sep{height:1px;background:rgba(255,255,255,.08)}


/* CONTENT */
.content{padding:16px;background:var(--gray-100);min-height:calc(100vh - 180px)}
.gen-section{margin-bottom:24px}
.gen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gen-title{font-family:'Bangers',cursive;font-size:22px;color:var(--red);letter-spacing:1px}
.gen-title span{font-family:'Nunito',sans-serif;font-size:12px;color:var(--gray-400);font-weight:700;margin-left:8px}
.gen-progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:80px;height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow));border-radius:4px;transition:width .4s ease}
.gen-count{font-size:12px;font-weight:700;color:var(--gray-700)}
.pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}

/* POKEMON CARD */
.pokemon-card{background:white;border-radius:var(--radius);padding:28px 6px 8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;border:2.5px solid transparent;transition:border-color .2s,background .2s;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.07);user-select:none}
.pokemon-card.collected{border-color:var(--yellow-dark);background:linear-gradient(135deg,#FFFDE7,#FFF8C4)}
.pokemon-card.form{border-style:dashed;border-color:#ccc}
.pokemon-card.form.collected{border-style:solid;border-color:var(--yellow-dark)}
.pokemon-card.regional{border-color:#aaa;border-style:dashed}
.pokemon-card.regional.collected{border-color:var(--yellow-dark);border-style:solid}
@keyframes syncFlicker{0%{box-shadow:0 0 0 0 rgba(255,204,0,0)}30%{box-shadow:0 0 0 6px rgba(255,204,0,.7)}100%{box-shadow:0 0 0 0 rgba(255,204,0,0)}}
.pokemon-card.synced-in{animation:syncFlicker .9s ease-out}

/* Card body (clickeable para abrir modal) */
.card-body{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:0}
.card-body:active{opacity:.7}

/* Check button — esquina superior izquierda */
.check-btn{position:absolute;top:4px;left:4px;width:26px;height:26px;border:none;background:none;padding:0;cursor:pointer;z-index:3;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.check-btn:active{transform:scale(.82)}
.check-btn svg{width:21px;height:21px}

/* TCG badge — esquina superior derecha */
.card-icon{position:absolute;top:5px;right:5px;line-height:1;pointer-events:none;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}.card-icon svg{display:block;width:14px;height:14px}

.pokemon-img{width:54px;height:54px;image-rendering:pixelated;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));pointer-events:none}
.pokemon-card:not(.collected) .pokemon-img{filter:grayscale(.4) opacity(.6)}
.pokemon-number{font-size:10px;color:var(--gray-400);font-weight:700;letter-spacing:.5px;pointer-events:none}
.pokemon-name{font-size:11px;font-weight:700;color:var(--dark);text-align:center;text-transform:capitalize;line-height:1.2;pointer-events:none}
.form-label{font-size:9px;color:var(--gray-400);text-align:center;font-weight:600;line-height:1.1;pointer-events:none}

/* UTILS */
.loading{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:80px}
.loading-pb{width:48px;height:48px;animation:pbspin 0.8s linear infinite}
.loading-text{font-size:13px;font-weight:700;color:rgba(0,0,0,.4);letter-spacing:.3px}
@keyframes pbspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.lb{width:14px;height:14px;border-radius:50%;background:var(--red);animation:bounce .7s infinite alternate}
.lb:nth-child(2){animation-delay:.15s;background:var(--yellow)}
.lb:nth-child(3){animation-delay:.3s}
@keyframes bounce{from{transform:translateY(0);opacity:.5}to{transform:translateY(-18px);opacity:1}}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state p{font-weight:700;font-size:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:10px 22px;border-radius:30px;font-weight:700;font-size:14px;z-index:2000;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.section-divider{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:1px;text-transform:uppercase;padding:8px 0 6px;margin-top:10px;border-top:1px dashed var(--gray-200)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#181818;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92dvh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.7);border-top:1px solid rgba(255,255,255,.07);animation:sheetUp .28s cubic-bezier(.32,.72,0,1);overflow:hidden;will-change:transform}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.modal-header{display:flex;align-items:center;gap:10px;padding:12px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.modal-pb-btn{width:44px;height:44px;border:none;background:none;cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.modal-pb-btn svg{width:40px;height:40px}
.modal-sprite{width:52px;height:52px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}
.modal-title-wrap{flex:1;min-width:0}
.modal-poke-num{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1px}
.modal-poke-name{font-family:'Bangers',cursive;font-size:24px;color:var(--yellow);letter-spacing:1px;line-height:1.15;white-space:nowrap;transition:font-size .1s}
.modal-poke-form{font-size:10px;color:rgba(255,255,255,.45);font-weight:700;margin-top:2px;line-height:1.3}
.modal-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.modal-close:active{background:rgba(255,255,255,.2)}
/* Body scrollable */
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px}
/* Footer eliminado — acción de captura en el header */
.modal-collect-btn{display:none}

/* Seccion carta */
.card-img-wrap{display:flex;justify-content:center;margin-bottom:12px}
.lang-select-wrap{display:flex;align-items:center;gap:6px}
.lang-flag{font-size:16px;line-height:1}
.lang-select{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 8px;outline:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lang-select option{background:#242424;color:white}
.card-saved-full{width:100%;max-width:min(240px,65vw);max-height:50dvh;border-radius:12px;object-fit:contain;box-shadow:0 8px 32px rgba(0,0,0,.7);display:block;margin:0 auto}
.card-saved-btns{display:flex;gap:8px;margin-top:10px}
.card-mini-btn{flex:1;padding:12px 4px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.card-mini-btn:active{opacity:.7}
.card-mini-btn.change{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.card-mini-btn.del{background:rgba(255,60,60,.1);color:rgba(255,100,100,.8)}
.card-info-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.card-info-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.card-edit-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;border:1.5px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.card-edit-btn:active{background:rgba(255,255,255,.08)}
.card-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.card-field{display:flex;flex-direction:column;gap:3px}
.card-field-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.card-field-value{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);line-height:1.3}
.card-field-value.num{font-family:monospace;font-size:12px}
.card-field-value.rarity{color:var(--yellow);opacity:.9}
.card-field-value.empty{color:rgba(255,255,255,.2);font-style:italic;font-size:12px}
/* Edit form */
.card-edit-form{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.card-edit-field{display:flex;flex-direction:column;gap:4px}
.card-edit-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.card-edit-input{padding:10px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;width:100%;box-sizing:border-box}
.card-edit-input::placeholder{color:rgba(255,255,255,.2)}
.card-edit-input:focus{border-color:var(--yellow)}
.card-edit-actions{display:flex;gap:8px;margin-top:4px}
.card-edit-save{flex:1;padding:12px;border-radius:10px;border:none;background:var(--yellow);color:var(--dark);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-edit-save:active{opacity:.8}
.card-edit-cancel{padding:12px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.4);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
/* URL input — vertical */
.card-url-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;box-sizing:border-box}
.card-url-input::placeholder{color:rgba(255,255,255,.3)}
.card-url-input:focus{border-color:var(--yellow)}
.card-url-save{width:100%;margin-top:10px;padding:13px;border-radius:10px;border:none;background:var(--yellow);color:var(--dark);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;display:block}
.card-url-save:active{opacity:.8}
.card-url-hint{font-size:11px;color:rgba(255,255,255,.3);margin-top:8px;font-weight:600;text-align:center}

/* VISOR CARTA */
.card-viewer-overlay{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);align-items:center;justify-content:center;flex-direction:column;padding:24px 20px;gap:20px}
.card-viewer-overlay.open{display:flex}
.card-viewer-img{max-width:min(300px,84vw);max-height:70dvh;border-radius:14px;object-fit:contain;box-shadow:0 20px 70px rgba(0,0,0,.9);animation:cardPop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.card-viewer-close{padding:12px 32px;border-radius:30px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}

.gen-filter-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.1);border:2px solid transparent;color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;margin-bottom:12px}
.gen-filter-btn.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow-dark)}
/* GEN FILTER MODAL */
.gen-modal-overlay{display:none;position:fixed;inset:0;z-index:1050;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}.gen-modal-overlay.open{display:flex}
.gen-modal-sheet{background:#181818;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:80dvh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.7);border-top:1px solid rgba(255,255,255,.07);animation:sheetUp .28s cubic-bezier(.32,.72,0,1);overflow:hidden}
.gen-modal-handle{width:40px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.gen-modal-header{padding:12px 18px 10px;font-family:'Bangers',cursive;font-size:20px;color:var(--yellow);letter-spacing:1px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.gen-modal-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0}
.gen-modal-item{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:transparent;width:100%;text-align:left;color:rgba(255,255,255,.85);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700}.gen-modal-item:active{background:rgba(255,255,255,.05)}
.gen-modal-check{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,.2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:transparent;transition:background .15s,border-color .15s}
.gen-modal-item.selected .gen-modal-check{background:var(--yellow);border-color:var(--yellow-dark);color:var(--dark)}
.gen-modal-sep{height:1px;background:rgba(255,255,255,.08);margin:4px 18px}
.gen-modal-footer{padding:12px 18px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.07)}
.gen-modal-apply{width:100%;padding:14px;border-radius:12px;border:none;background:var(--yellow);color:var(--dark);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent}.gen-modal-apply:active{opacity:.85}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div style="position:relative;flex-shrink:0;width:38px;height:38px">
        <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
          <path d="M1.5 20 A18.5 18.5 0 0 1 38.5 20 Z" fill="#CC0000"/>
          <path d="M1.5 20 A18.5 18.5 0 0 0 38.5 20 Z" fill="white"/>
          <circle cx="20" cy="20" r="18.5" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <path d="M1.5 20h13.5M25 20h13.5" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="5" fill="rgba(0,0,0,0.12)" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
        </svg>
        <div class="sync-dot syncing" id="sync-dot" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;z-index:2;width:7px;height:7px"></div>
      </div>
      <div>
        <div class="logo-text">Cacos Collector</div>
        <div class="logo-sub"><span class="version-badge" id="app-version"></span></div>
      </div>
    </div>
    <div class="header-right">
      <div class="stats-badge">
        <div class="stats-number" id="global-count">-- / --</div>
        <div class="stats-label">Capturados</div>
      </div>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" type="search" id="search" placeholder="Buscar Pokémon..." autocomplete="off">
    <div style="position:relative;flex-shrink:0">
      <button class="menu-btn" id="menu-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="3" width="16" height="11" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M7 17h6M10 14v3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

// TOAST & SYNC
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}
function setSyncState(s){document.getElementById('sync-dot').className='sync-dot'+(s!=='ok'?' '+s:'')}

// FIRESTORE
async function saveAll(){setSyncState('syncing');try{await setDoc(colRef,{ids:[...collected],tcg:tcgCards});setSyncState('ok')}catch(e){setSyncState('error');console.error(e)}}
function loadFromSnap(data){collected=new Set(data.ids||[]);tcgCards=data.tcg||{}}

function startListener(){
  onSnapshot(colRef,snap=>{
    if(!snap.exists()){setSyncState('ok');return}
    if(isLocalChange){isLocalChange=false;return}
    const data=snap.data();
    const prev=new Set(collected);
    const prevTcg=JSON.stringify(tcgCards);
    loadFromSnap(data);
    const added=[...collected].filter(id=>!prev.has(id));
    const removed=[...prev].filter(id=>!collected.has(id));
    patchCards(added,removed);
    if(JSON.stringify(tcgCards)!==prevTcg)renderContent();
    updateGlobalCount();updateAllGenProgress();
    if(added.length+removed.length>0)showToast('Tu pareja actualizo '+( added.length+removed.length)+' Pokemon');
    setSyncState('ok');
  },err=>{setSyncState('error');console.error(err)});
}

function patchCards(added,removed){
  for(const id of added){const c=document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);if(c){c.classList.add('collected');c.querySelector('.check-btn').innerHTML=CARD_PB_FULL;c.classList.remove('synced-in');void c.offsetWidth;c.classList.add('synced-in')}}
  for(const id of removed){const c=document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);if(c){c.classList.remove('collected');c.querySelector('.check-btn').innerHTML=CARD_PB_EMPTY;c.classList.remove('synced-in');void c.offsetWidth;c.classList.add('synced-in')}}
}

// NAMES
const NAMES_KEY='pokedex_names_es_v2';
async function fetchName(id){if(nameCache[id])return nameCache[id];try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);const d=await r.json();const es=d.names.find(n=>n.language.name==='es');return es?es.name:d.name}catch{return '#'+id}}

// BUILD LIST
// allPokemon entries have: id, name, gen, sprite, formLabel, type
// type: 'base' | 'family' | 'regional' | 'hisui'
// baseId: for family forms, the dex number of the parent (used to sort inline)
function buildPokemonList(){
  allPokemon=[];
  for(const gen of GENERATIONS){
    if(gen.id==='hisui'){
      // Hisui: base Pokemon 899-905, con family forms inline
      for(let id=gen.range[0];id<=gen.range[1];id++){
        allPokemon.push({id:String(id),name:nameCache[id]||('#'+id),gen:'hisui',sprite:null,formLabel:'',type:'base',baseId:null});
        // Insert family forms right after their base (e.g. Ursaluna Luna Carmesi after #901)
        for(const f of ALT_FORMS.filter(f=>f.type==='family'&&f.gen==='hisui'&&f.baseId===String(id)))
          allPokemon.push({id:f.key,name:f.name,gen:'hisui',sprite:f.sprite,formLabel:f.formLabel,type:'family',baseId:f.baseId});
      }
      // Then Hisui regional variants at the end
      for(const f of ALT_FORMS.filter(f=>f.type==='hisui'))
        allPokemon.push({id:f.key,name:f.name,gen:'hisui',sprite:f.sprite,formLabel:f.formLabel,type:'regional',baseId:f.baseId});
    } else {
      // Base Pokemon for this gen
      for(let id=gen.range[0];id<=gen.range[1];id++){
        allPokemon.push({id:String(id),name:nameCache[id]||('#'+id),gen:gen.id,sprite:null,formLabel:'',type:'base',baseId:null});
        // Insert family forms right after their base
        for(const f of ALT_FORMS.filter(f=>f.type==='family'&&f.gen===gen.id&&f.baseId===String(id)))
          allPokemon.push({id:f.key,name:f.name,gen:gen.id,sprite:f.sprite,formLabel:f.formLabel,type:'family',baseId:f.baseId});
      }
      // Regional forms at the end of their gen
      for(const f of ALT_FORMS.filter(f=>f.type==='regional'&&f.gen===gen.id))
        allPokemon.push({id:f.key,name:f.name,gen:gen.id,sprite:f.sprite,formLabel:f.formLabel,type:'regional',baseId:f.baseId});
    }
  }
}

// GEN FILTER
function genFilterLabel(){
  if(activeGens.size===0)return'Todas';
  const names=GENERATIONS.filter(g=>activeGens.has(String(g.id))).map(g=>g.region);
  if(names.length===1)return'Gen: '+names[0];
  if(names.length===2)return'Gen: '+names.join(', ');
  return'Gen: '+names[0]+', '+names[1]+' +'+(names.length-2)+' más';
}

function updateGenFilterBtn(){
  const btn=document.getElementById('gen-filter-btn');
  const label=document.getElementById('gen-filter-label');
  if(!btn||!label)return;
  label.textContent=genFilterLabel();
  btn.classList.toggle('active',activeGens.size>0);
}

function renderGenModalList(){
  const allSelected=pendingGens.size===0;
  let html='<button class="gen-modal-item'+(allSelected?' selected':'')+'" data-gen="all">'
    +'<div class="gen-modal-check">'+(allSelected?'✓':'')+'</div>Todas</button>'
    +'<div class="gen-modal-sep"></div>';
  for(const gen of GENERATIONS){
    const gid=String(gen.id);
    const sel=pendingGens.has(gid);
    const label=gen.id==='hisui'?'Hisui - Hisui':('Gen '+gen.id+' - '+gen.region);
    html+='<button class="gen-modal-item'+(sel?' selected':'')+'" data-gen="'+gid+'">'
      +'<div class="gen-modal-check">'+(sel?'✓':'')+'</div>'+label+'</button>';
  }
  const list=document.getElementById('gen-modal-list');
  list.innerHTML=html;
  list.querySelectorAll('.gen-modal-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const g=item.dataset.gen;
      if(g==='all'){
        pendingGens.clear();
      } else {
        if(pendingGens.has(g))pendingGens.delete(g);else pendingGens.add(g);
        if(pendingGens.size===GENERATIONS.length)pendingGens.clear();
      }
      renderGenModalList();
    });
  });
}

function openGenModal(){
  pendingGens=new Set(activeGens);
  renderGenModalList();
  document.getElementById('gen-modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeGenModal(){
  document.getElementById('gen-modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function buildGenFilter(){
  updateGenFilterBtn();
  document.getElementById('gen-filter-btn').addEventListener('click',openGenModal);
  document.getElementById('gen-modal-apply').addEventListener('click',()=>{
    activeGens=new Set(pendingGens);
    closeGenModal();
    updateGenFilterBtn();
    renderContent();
  });
  document.getElementById('gen-modal-overlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('gen-modal-overlay'))closeGenModal();
  });
}

// FILTER
function getFiltered(){
  let list=allPokemon;
  if(activeGens.size>0)list=list.filter(p=>activeGens.has(String(p.gen)));
  if(filterMissing)list=list.filter(p=>!collected.has(p.id));
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.formLabel&&p.formLabel.toLowerCase().includes(q))||String(p.id).includes(q))}
  return list;
}

function cardHTML(p){
  const spriteUrl=p.sprite||('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+p.id+'.png');
  const numLabel=!isNaN(p.id)?('#'+String(p.id).padStart(4,'0')):'';
  const isCol=collected.has(p.id);
  const hasTcg=!!tcgCards[p.id];
  const extraClass=(p.type==='family'?' form':(p.type==='regional'||p.type==='hisui')?' form regional':'');
  return '<div class="pokemon-card'+(isCol?' collected':'')+extraClass+'" data-id="'+p.id+'">'
    +'<button class="check-btn" data-action="check">'+(isCol?CARD_PB_FULL:CARD_PB_EMPTY)+'</button>'
    +(hasTcg?'<div class="card-icon">'+CARD_TCG_ICON+'</div>':'')
    +'<div class="card-body" data-action="open">'
    +'<img class="pokemon-img" src="'+spriteUrl+'" alt="'+p.name+'" loading="lazy" onerror="this.style.visibility=&quot;hidden&quot;">'
    +(numLabel?'<div class="pokemon-number">'+numLabel+'</div>':'')
    +'<div class="pokemon-name">'+p.name+'</div>'
    +(p.formLabel?'<div class="form-label">'+p.formLabel+'</div>':'')

function renderContent(){
  const content=document.getElementById('content');
  const filtered=getFiltered();
  if(filtered.length===0){content.innerHTML='<div class="empty-state"><div class="ei">&#128269;</div><p>No se encontraron Pokémon</p></div>';updateGlobalCount();return}
  const byGen={};
  for(const p of filtered){
    const gk=String(p.gen);
    if(!byGen[gk])byGen[gk]={main:[],regional:[]};
    if(p.type==='regional')byGen[gk].regional.push(p);
    else byGen[gk].main.push(p);
  }
  let html='';
  for(const gen of GENERATIONS){
    if(!byGen[String(gen.id)])continue;
    const{main,regional}=byGen[String(gen.id)];
    const all=[...main,...regional];
    const got=all.filter(p=>collected.has(p.id)).length;
    const pct=all.length?Math.round(got/all.length*100):0;
    html+='<div class="gen-section" data-gen="'+gen.id+'">'
      +'<div class="gen-header"><div class="gen-title">'+gen.name+'<span>'+gen.region+'</span></div>'
      +'<div class="gen-progress"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><span class="gen-count">'+got+'/'+all.length+'</span></div></div>'
      +'<div class="pokemon-grid">'+main.map(p=>cardHTML(p)).join('')+'</div>'
      +(regional.length?'<div class="section-divider">Variantes regionales</div><div class="pokemon-grid">'+regional.map(p=>cardHTML(p)).join('')+'</div>':'')
      +'</div>';
  }
  content.innerHTML=html;
  updateGlobalCount();
  attachClicks();
}


// CLICKS
function attachClicks(){
  const content=document.getElementById('content');
  content.addEventListener('click',async e=>{
    if(e.target.closest('[data-action="check"]')){
      e.stopPropagation();
      const card=e.target.closest('.pokemon-card');
      if(card)await toggleCollected(card);
      return;
    }
    if(e.target.closest('[data-action="open"]')){
      const card=e.target.closest('.pokemon-card');
      if(card){const poke=allPokemon.find(p=>p.id===card.dataset.id);if(poke)openModal(poke)}
      return;
    }
  });
}

async function toggleCollected(card){
  const id=card.dataset.id;
  const poke=allPokemon.find(p=>p.id===id);
  const name=poke?(poke.formLabel?poke.name+' ('+poke.formLabel+')':poke.name):id;
  isLocalChange=true;
  if(collected.has(id)){collected.delete(id);card.classList.remove('collected');card.querySelector('.check-btn').innerHTML=CARD_PB_EMPTY;showToast(name+' eliminado')}
  else{collected.add(id);card.classList.add('collected');card.querySelector('.check-btn').innerHTML=CARD_PB_FULL;showToast(name+' ¡capturado!')}
  if(filterMissing&&!collected.has(id))card.remove();
  updateGlobalCount();updateGenProgress(poke?.gen);
  await saveAll();
  if(modalPoke?.id===id)renderModalCollectBtn();
}

// Detecta si el link es de Serebii y extrae set/número
function parseSerebiiUrl(url){
  const m=url.match(/serebii\.net\/card\/([^/]+)\/0*(\d+)\.shtml/i);
  if(m)return{setName:m[1],number:m[2]};
  return null;
}

// Fetch con timeout de 6 segundos
async function fetchWithTimeout(url,ms=6000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  try{
    const res=await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    return res;
  }catch(e){
    clearTimeout(timer);
    throw e;
  }
}

// Descarga todos los sets y construye mapa nombre→id
async function loadTcgSets(){
  if(tcgSetsCache)return tcgSetsCache;
  try{
    const res=await fetch('https://api.pokemontcg.io/v2/sets?pageSize=250&orderBy=releaseDate');
    if(!res.ok)throw new Error('sets fetch failed');
    const data=await res.json();
    tcgSetsCache={...SEREBII_SET_MAP_FALLBACK};
    const norm=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'');
    for(const s of data.data||[]){
      tcgSetsCache[s.id.toLowerCase()]=s.id;
      if(s.ptcgoCode)tcgSetsCache[norm(s.ptcgoCode)]=s.id;
      tcgSetsCache[norm(s.name)]=s.id;
    }
    console.log('TCG sets loaded:',Object.keys(tcgSetsCache).length,'entries');
    return tcgSetsCache;
  }catch(e){
    console.warn('Could not load TCG sets:',e.message);
    tcgSetsCache=SEREBII_SET_MAP_FALLBACK;
    return tcgSetsCache;
  }
}

// Busca la carta en la API de PokémonTCG
let tcgSearchAbort=null;

function warmupTcgApi(){
  try{fetch('https://api.pokemontcg.io/v2/cards?q=name:pikachu&pageSize=1',{method:'HEAD'}).catch(()=>{})}catch(e){}
}

async function fetchTcgCardBySerebii(setName,number,retries=4,onStatus=null){
  const signal=tcgSearchAbort?.signal;
  const base='https://api.pokemontcg.io/v2/cards?pageSize=1&q=';
  const norm=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'');
  const sets=tcgSetsCache||SEREBII_SET_MAP_FALLBACK;
  const mappedId=sets[setName.toLowerCase()]||sets[norm(setName)];

  const PROMO_PREFIX={'swshp':'SWSH','smp':'SM','xyp':'XY','bwp':'BW','svp':'SVP','bwp':'BW'};
  const promoPrefix=mappedId?PROMO_PREFIX[mappedId]:null;
  const queries=[
    mappedId?'set.id:'+mappedId+' number:'+number:null,
    promoPrefix?'set.id:'+mappedId+' number:'+promoPrefix+number:null,
    'set.name:"'+setName+'" number:'+number,
  ].filter(Boolean);

  for(const q of queries){
    try{
      if(signal?.aborted)return null;
      const res=await fetchWithTimeout(base+encodeURIComponent(q),15000,signal);
      if(signal?.aborted)return null;
      if(res.ok){
        const data=await res.json();
        if(data.data?.length>0)return data.data[0];
      }
    }catch(e){
      if(e.name==='AbortError')return null;
      console.warn('TCG query failed:',q,e.message);
      if(retries>0){
        const attempt=5-retries;
        if(onStatus)onStatus('Reintento '+attempt+'/4...');
        await new Promise(r=>setTimeout(r,1500));
        if(signal?.aborted)return null;
        return fetchTcgCardBySerebii(setName,number,retries-1,onStatus);
      }
      return null;
    }
  }
  return null;
}

// Swipe gestures en el modal
{
  const sheet=document.getElementById('modal-sheet');
  let sx=0,sy=0,dir=null;
  sheet.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dir=null;},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(!dir)dir=Math.abs(dx)>Math.abs(dy)?'h':'v';
    if(dir==='v'&&dy>10){sheet.style.transform='translateY('+dy*.5+'px)';sheet.style.transition='none';}
    if(dir==='h'){sheet.style.transform='translateX('+dx*.3+'px)';sheet.style.transition='none';}
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    sheet.style.transition='transform .25s ease';
    sheet.style.transform='';
    setTimeout(()=>{sheet.style.transition='';},260);
    if(dir==='v'&&dy>80){closeModal();return;}
    if(dir==='h'&&Math.abs(dx)>60){
      const filtered=getFiltered();
      const idx=filtered.findIndex(p=>p.id===modalPoke?.id);
      if(idx===-1)return;
      const next=dx<0?filtered[idx+1]:filtered[idx-1];
      if(next){
        sheet.style.transition='transform .15s ease,opacity .15s ease';
        sheet.style.transform='translateX('+(dx<0?'-80px':'80px')+')';
        sheet.style.opacity='0';
        setTimeout(()=>{
          sheet.style.transition='';
          sheet.style.transform='translateX('+(dx<0?'80px':'-80px')+')';
          sheet.style.opacity='0';
          openModal(next);
          requestAnimationFrame(()=>{
            sheet.style.transition='transform .15s ease,opacity .15s ease';
            sheet.style.transform='';
            sheet.style.opacity='1';
          });
        },150);
      }
    }
  },{passive:true});
}

// PROGRESS
function updateGlobalCount(){const got=allPokemon.filter(p=>collected.has(p.id)).length;document.getElementById('global-count').textContent=got+' / '+allPokemon.length}
function updateGenProgress(genId){
  if(!genId)return;
  const section=document.querySelector('.gen-section[data-gen="'+genId+'"]');if(!section)return;
  const cards=section.querySelectorAll('.pokemon-card');
  const got=section.querySelectorAll('.pokemon-card.collected').length;
  const pct=cards.length?Math.round(got/cards.length*100):0;
  const fill=section.querySelector('.progress-fill');const cnt=section.querySelector('.gen-count');
  if(fill)fill.style.width=pct+'%';if(cnt)cnt.textContent=got+'/'+cards.length;
}
function updateAllGenProgress(){for(const g of GENERATIONS)updateGenProgress(g.id)}

// INIT
async function init(){
  try{nameCache=JSON.parse(localStorage.getItem(NAMES_KEY)||'{}')}catch{}
  try{const snap=await getDoc(colRef);if(snap.exists())loadFromSnap(snap.data())}catch(e){console.error(e);setSyncState('error')}
  buildPokemonList();buildGenFilter();renderContent();startListener();loadTcgSets();setSyncState('ok');
  const missing=allPokemon.filter(p=>p.type==='base'&&!nameCache[p.id]).map(p=>parseInt(p.id)).filter(Boolean);
  if(missing.length>0){
    const BATCH=15;
    for(let i=0;i<missing.length;i+=BATCH){
      const batch=missing.slice(i,i+BATCH);
      await Promise.all(batch.map(async id=>{
        const name=await fetchName(id);nameCache[id]=name;
        const entry=allPokemon.find(p=>p.id===String(id));if(entry)entry.name=name;
        const el=document.querySelector('.pokemon-card[data-id="'+id+'"] .pokemon-name');if(el)el.textContent=name;
      }));
      localStorage.setItem(NAMES_KEY,JSON.stringify(nameCache));
    }
  }
}
init();

<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/pokecollector/sw.js').catch(e=>console.warn('SW:',e))})}
(async()=>{
  try{
    const el=document.getElementById('app-version');
    if(!el)return;
    if('caches' in window){
      const keys=await caches.keys();
      const key=keys.find(k=>k.startsWith('pokedex-'));
      if(key){el.textContent=key.replace('pokedex-','');return;}
    }
    const res=await fetch('/pokecollector/sw.js?t='+Date.now());
    const txt=await res.text();
    const m=txt.match(/CACHE_NAME\s*=\s*'pokedex-(v\d+)'/);
    if(m)el.textContent=m[1];
  }catch(e){}
})();

</script>
