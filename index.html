<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#CC0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokéDex">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PokéDex Colección</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC0000; --red-dark: #8B0000;
    --yellow: #FFCC00; --yellow-dark: #E6A800;
    --dark: #1A1A1A;
    --gray-100: #F0F0F0; --gray-200: #DEDEDE;
    --gray-400: #999; --gray-700: #444;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #1A1A1A; min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(160deg, var(--red-dark) 0%, var(--red) 55%, #DD2222 100%);
    padding: 16px 16px 0; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .pokeball {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(180deg, #fafafa 50%, #1a1a1a 50%);
    border: 3px solid #1a1a1a; position: relative; flex-shrink: 0;
  }
  .pokeball::before {
    content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 11px; height: 11px; border-radius: 50%; background: white; border: 2.5px solid #1a1a1a; z-index: 1;
  }
  .pokeball::after {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    transform: translateY(-50%); height: 3px; background: #1a1a1a;
  }
  .logo-text { font-family: 'Bangers', cursive; font-size: 30px; color: var(--yellow); letter-spacing: 1px; text-shadow: 2px 2px 0 rgba(0,0,0,0.35); line-height: 1; }
  .logo-sub { font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: #44DD44; box-shadow: 0 0 6px #44DD44; transition: all 0.3s; flex-shrink: 0; }
  .sync-dot.syncing { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 0.6s infinite alternate; }
  .sync-dot.error { background: #FF4444; box-shadow: 0 0 6px #FF4444; animation: none; }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
  .stats-badge { background: rgba(0,0,0,0.35); border-radius: 20px; padding: 6px 14px; text-align: center; border: 1px solid rgba(255,255,255,0.15); }
  .stats-number { font-family: 'Bangers', cursive; font-size: 20px; color: var(--yellow); line-height: 1; }
  .stats-label { font-size: 9px; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-input {
    flex: 1; padding: 10px 16px; border-radius: 30px; border: 2px solid transparent;
    background: rgba(255,255,255,0.15); color: white;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; outline: none; transition: all 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .search-input:focus { background: rgba(255,255,255,0.25); border-color: var(--yellow); }
  .btn-filter {
    padding: 10px 14px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1); color: white;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-filter.active { background: var(--yellow); color: var(--dark); border-color: var(--yellow-dark); }
  .gen-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .gen-tabs::-webkit-scrollbar { display: none; }
  .gen-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    background: rgba(255,255,255,0.1); border: 2px solid transparent;
    color: rgba(255,255,255,0.7); font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .gen-tab.active { background: var(--yellow); color: var(--dark); border-color: var(--yellow-dark); }

  /* ── CONTENT ── */
  .content { padding: 16px; background: var(--gray-100); min-height: calc(100vh - 180px); }
  .gen-section { margin-bottom: 24px; }
  .gen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .gen-title { font-family: 'Bangers', cursive; font-size: 22px; color: var(--red); letter-spacing: 1px; }
  .gen-title span { font-family: 'Nunito', sans-serif; font-size: 12px; color: var(--gray-400); font-weight: 700; margin-left: 8px; }
  .gen-progress { display: flex; align-items: center; gap: 8px; }
  .progress-bar { width: 80px; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--yellow)); border-radius: 4px; transition: width 0.4s ease; }
  .gen-count { font-size: 12px; font-weight: 700; color: var(--gray-700); }
  .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; }

  /* ── POKEMON CARD ── */
  .pokemon-card {
    background: white; border-radius: var(--radius); padding: 10px 6px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; border: 2.5px solid transparent;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .pokemon-card.collected { border-color: var(--yellow-dark); background: linear-gradient(135deg, #FFFDE7, #FFF8C4); }
  .pokemon-card.collected::after { content: '✓'; position: absolute; top: 4px; right: 7px; color: var(--red); font-size: 14px; font-weight: 900; }
  .pokemon-card.form { border-style: dashed; border-color: #ccc; }
  .pokemon-card.form.collected { border-style: solid; border-color: var(--yellow-dark); }
  @keyframes syncFlicker {
    0%   { box-shadow: 0 0 0 0 rgba(255,204,0,0); }
    30%  { box-shadow: 0 0 0 6px rgba(255,204,0,0.7); }
    100% { box-shadow: 0 0 0 0 rgba(255,204,0,0); }
  }
  .pokemon-card.synced-in { animation: syncFlicker 0.9s ease-out; }
  @keyframes pressRing {
    0%   { box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 0px rgba(255,204,0,0.9); }
    100% { box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 12px rgba(255,204,0,0); }
  }
  .pokemon-card.pressing { background: #FFFBEA !important; animation: pressRing 0.5s ease-out forwards; }
  .pokemon-card.collected.pressing { background: linear-gradient(135deg,#FFF8C4,#FFE066) !important; }

  .pokemon-img { width: 58px; height: 58px; image-rendering: pixelated; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12)); transition: filter 0.2s; }
  .pokemon-card:not(.collected) .pokemon-img { filter: grayscale(0.4) opacity(0.6); }
  .pokemon-number { font-size: 10px; color: var(--gray-400); font-weight: 700; letter-spacing: 0.5px; }
  .pokemon-name { font-size: 11px; font-weight: 700; color: var(--dark); text-align: center; text-transform: capitalize; line-height: 1.2; }
  .form-label { font-size: 9px; color: var(--gray-400); text-align: center; font-weight: 600; line-height: 1.1; }
  .tcg-badge { position: absolute; bottom: 4px; left: 5px; font-size: 10px; line-height: 1; pointer-events: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }

  .loading { display: flex; justify-content: center; align-items: center; padding: 80px; gap: 10px; }
  .lb { width: 14px; height: 14px; border-radius: 50%; background: var(--red); animation: bounce 0.7s infinite alternate; }
  .lb:nth-child(2) { animation-delay: 0.15s; background: var(--yellow); }
  .lb:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-18px); opacity: 1; } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .empty-state .ei { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-weight: 700; font-size: 16px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--dark); color: white; padding: 10px 22px;
    border-radius: 30px; font-weight: 700; font-size: 14px;
    z-index: 2000; transition: transform 0.3s; pointer-events: none;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .section-divider {
    font-size: 11px; font-weight: 700; color: var(--gray-400);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 0 6px; margin-top: 10px; border-top: 1px dashed var(--gray-200);
  }

  /* ── FIRST-VISIT HINT ── */
  .press-hint {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,20,0.95); color: rgba(255,255,255,0.9);
    font-size: 12px; font-weight: 700; padding: 9px 18px; border-radius: 20px;
    z-index: 1500; pointer-events: none; white-space: nowrap;
    border: 1px solid rgba(255,204,0,0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: hintFade 4.5s ease forwards;
  }
  @keyframes hintFade {
    0%,8%  { opacity:0; transform: translateX(-50%) translateY(8px); }
    18%,75%{ opacity:1; transform: translateX(-50%) translateY(0); }
    100%   { opacity:0; transform: translateX(-50%) translateY(0); }
  }

  /* ══════════════════════════════════════
     ① VISTA DE CARTA GUARDADA
     ══════════════════════════════════════ */
  .card-view-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    align-items: center; justify-content: center; flex-direction: column;
    padding: 28px 20px 24px;
  }
  .card-view-overlay.open { display: flex; }

  .card-view-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
  .cv-loading { display: flex; gap: 8px; align-items: center; justify-content: center; }
  .card-view-img {
    max-width: min(280px, 78vw); max-height: 62dvh;
    border-radius: 14px; object-fit: contain;
    box-shadow: 0 20px 70px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.05);
    animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardPop {
    from { opacity:0; transform: scale(0.78) translateY(12px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .card-view-info { text-align: center; padding: 16px 0 6px; flex-shrink: 0; }
  .card-view-name { font-family: 'Bangers', cursive; font-size: 28px; color: var(--yellow); letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
  .card-view-set { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

  .card-view-actions { display: flex; gap: 10px; width: 100%; max-width: 340px; flex-shrink: 0; }
  .cv-btn {
    flex: 1; padding: 15px 8px; border-radius: 16px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s; min-height: 52px; line-height: 1.2;
  }
  .cv-btn:active { transform: scale(0.94); }
  .cv-btn-change { background: var(--yellow); color: var(--dark); }
  .cv-btn-remove { background: rgba(255,60,60,0.15); color: rgba(255,120,120,0.9); border: 1px solid rgba(255,60,60,0.2); }
  .cv-btn-close  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08); }

  /* ══════════════════════════════════════
     ② SELECTOR DE CARTAS (bottom sheet)
     ══════════════════════════════════════ */
  .selector-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.72); backdrop-filter: blur(3px);
    align-items: flex-end; justify-content: center;
  }
  .selector-overlay.open { display: flex; }

  .selector-sheet {
    background: #181818; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 540px;
    max-height: 88dvh; display: flex; flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
    border-top: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
    animation: sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);
    will-change: transform;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 8px; flex-shrink: 0; }
  .sheet-poke-name { font-family: 'Bangers', cursive; font-size: 26px; color: var(--yellow); letter-spacing: 1px; line-height: 1; }
  .sheet-subtitle { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .sheet-close {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .sheet-close:active { background: rgba(255,255,255,0.2); }

  .sheet-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 14px 36px; flex: 1; }
  .sheet-section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 10px 4px 6px; }

  .tcg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
  .tcg-tile-wrap { display: flex; flex-direction: column; gap: 4px; }
  .tcg-tile {
    position: relative; border-radius: 10px; overflow: hidden;
    cursor: pointer; border: 2.5px solid transparent;
    background: #2a2a2a; aspect-ratio: 2.5 / 3.5;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s, border-color 0.15s;
  }
  .tcg-tile:active { transform: scale(0.93); }
  .tcg-tile img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.25s; border-radius: 8px; }
  .tcg-tile img.loaded { opacity: 1; }
  .tcg-tile-label { font-size: 9px; color: rgba(255,255,255,0.35); font-weight: 700; text-align: center; padding: 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tcg-tile .selected-check { position: absolute; top: 5px; right: 5px; background: var(--yellow); color: #111; font-size: 11px; font-weight: 900; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.5); }

  .sheet-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 20px; gap: 14px; color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 700; }
  .sheet-dots { display: flex; gap: 6px; }
  .sheet-dot { width: 10px; height: 10px; border-radius: 50%; animation: bounce 0.7s infinite alternate; }
  .sheet-dot:nth-child(1) { background: var(--red); }
  .sheet-dot:nth-child(2) { background: var(--yellow); animation-delay: 0.15s; }
  .sheet-dot:nth-child(3) { background: var(--red); animation-delay: 0.3s; }
  .sheet-empty { text-align: center; padding: 56px 20px; color: rgba(255,255,255,0.3); font-size: 14px; font-weight: 700; }
  .sheet-empty span { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ══════════════════════════════════════
     ③ PREVIEW PANTALLA COMPLETA
     ══════════════════════════════════════ */
  .preview-overlay {
    display: none; position: fixed; inset: 0; z-index: 1100;
    background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
    align-items: center; justify-content: center; flex-direction: column;
    padding: 28px 20px 24px;
  }
  .preview-overlay.open { display: flex; }
  .preview-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
  .preview-img {
    max-width: min(280px, 80vw); max-height: 64dvh;
    border-radius: 14px; object-fit: contain;
    box-shadow: 0 20px 70px rgba(0,0,0,0.95);
    animation: cardPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .preview-info { text-align: center; padding: 14px 0 6px; flex-shrink: 0; }
  .preview-set { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .preview-actions { display: flex; gap: 10px; width: 100%; max-width: 340px; flex-shrink: 0; }
  .pv-btn {
    flex: 1; padding: 15px 8px; border-radius: 16px; border: none;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s; min-height: 52px;
  }
  .pv-btn:active { transform: scale(0.94); }
  .pv-btn-select { background: var(--yellow); color: var(--dark); }
  .pv-btn-back   { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="pokeball"></div>
      <div>
        <div class="logo-text">PokéDex</div>
        <div class="logo-sub">Colección compartida</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <div class="stats-badge">
        <div class="stats-number" id="global-count">— / —</div>
        <div class="stats-label">Capturados</div>
      </div>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" type="search" id="search" placeholder="🔍  Buscar Pokémon..." autocomplete="off">
    <button class="btn-filter" id="btn-missing">Faltan</button>
    <button class="btn-filter" id="btn-mark-all">✓ Todos</button>
  </div>
  <div class="gen-tabs" id="gen-tabs">
    <div class="gen-tab active" data-gen="all">Todos</div>
  </div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="lb"></div><div class="lb"></div><div class="lb"></div></div>
</div>
<div class="toast" id="toast"></div>

<!-- ① VISTA DE CARTA GUARDADA -->
<div class="card-view-overlay" id="card-view-overlay">
  <div class="card-view-img-wrap">
    <div class="cv-loading" id="cv-loading">
      <div class="lb"></div><div class="lb"></div><div class="lb"></div>
    </div>
    <img class="card-view-img" id="cv-img" src="" alt="" style="display:none">
  </div>
  <div class="card-view-info">
    <div class="card-view-name" id="cv-name"></div>
    <div class="card-view-set"  id="cv-set"></div>
  </div>
  <div class="card-view-actions">
    <button class="cv-btn cv-btn-change" id="cv-btn-change">🔄 Cambiar</button>
    <button class="cv-btn cv-btn-remove" id="cv-btn-remove">✕ Quitar</button>
    <button class="cv-btn cv-btn-close"  id="cv-btn-close">Cerrar</button>
  </div>
</div>

<!-- ② SELECTOR DE CARTAS -->
<div class="selector-overlay" id="selector-overlay">
  <div class="selector-sheet" id="selector-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-poke-name" id="sheet-poke-name"></div>
        <div class="sheet-subtitle">Toca una carta para seleccionarla</div>
      </div>
      <button class="sheet-close" id="sheet-close">✕</button>
    </div>
    <div class="sheet-scroll" id="sheet-scroll">
      <div class="sheet-loading">
        <div class="sheet-dots"><div class="sheet-dot"></div><div class="sheet-dot"></div><div class="sheet-dot"></div></div>
        Buscando cartas TCG…
      </div>
    </div>
  </div>
</div>

<!-- ③ PREVIEW PANTALLA COMPLETA -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-img-wrap">
    <img class="preview-img" id="pv-img" src="" alt="">
  </div>
  <div class="preview-info">
    <div class="preview-set" id="pv-set"></div>
  </div>
  <div class="preview-actions">
    <button class="pv-btn pv-btn-select" id="pv-btn-select">✓ Esta es la mía</button>
    <button class="pv-btn pv-btn-back"   id="pv-btn-back">← Volver</button>

// ─── STATE ───
let collected     = new Set();
let tcgCards      = {};   // { pokeId: { cardId, imageUrl, setName, localId } }
let allPokemon    = [];
let nameCache     = {};
let activeGen     = 'all';
let filterMissing = false;
let searchQuery   = '';
let isLocalChange = false;

// ─── TOAST & SYNC ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function setSyncState(s) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot' + (s !== 'ok' ? ' '+s : '');
}

// ─── FIRESTORE ───
async function saveAll() {
  setSyncState('syncing');
  try {
    await setDoc(colRef, { ids: [...collected], tcg: tcgCards });
    setSyncState('ok');
  } catch(e) { setSyncState('error'); console.error(e); }
}
function loadTcgFromSnap(data) {
  tcgCards = data.tcg || {};
}
function startListener() {
  onSnapshot(colRef, snap => {
    if (!snap.exists()) { setSyncState('ok'); return; }
    if (isLocalChange) { isLocalChange = false; return; }
    const data = snap.data();
    const remoteIds = data.ids || [];
    const remoteSet = new Set(remoteIds);
    const added   = remoteIds.filter(id => !collected.has(id));
    const removed = [...collected].filter(id => !remoteSet.has(id));
    collected = remoteSet;
    loadTcgFromSnap(data);
    patchCards(added, removed);
    updateGlobalCount(); updateAllGenProgress();
    if (added.length + removed.length > 0)
      showToast(`🔄 Tu pareja actualizó ${added.length + removed.length} Pokémon`);
    setSyncState('ok');
  }, err => { setSyncState('error'); console.error(err); });
}
function patchCards(added, removed) {
  for (const id of added) {
    const c = document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);
    if (c) { c.classList.add('collected'); c.classList.remove('synced-in'); void c.offsetWidth; c.classList.add('synced-in'); }
  }
  for (const id of removed) {
    const c = document.querySelector(`.pokemon-card[data-id="${CSS.escape(String(id))}"]`);
    if (c) { c.classList.remove('collected'); c.classList.remove('synced-in'); void c.offsetWidth; c.classList.add('synced-in'); }
  }
}

// ─── NAMES ───
const NAMES_KEY = 'pokedex_names_es_v2';
async function fetchName(id) {
  if (nameCache[id]) return nameCache[id];
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);
    const d = await r.json();
    const es = d.names.find(n => n.language.name === 'es');
    return es ? es.name : d.name;
  } catch { return `#${id}`; }
}

// ─── BUILD LIST ───
function buildPokemonList() {
  allPokemon = [];
  for (const gen of GENERATIONS) {
    for (let id = gen.range[0]; id <= gen.range[1]; id++)
      allPokemon.push({ id: String(id), name: nameCache[id] || `#${id}`, gen: gen.id, isForm: false, sprite: null, formLabel: '' });
    for (const f of ALT_FORMS.filter(f => f.gen === gen.id))
      allPokemon.push({ id: f.key, name: f.name, gen: f.gen, isForm: true, sprite: f.sprite, formLabel: f.formLabel });
  }
}

// ─── GEN TABS ───
function buildGenTabs() {
  const container = document.getElementById('gen-tabs');
  container.innerHTML = '<div class="gen-tab active" data-gen="all">Todos</div>';
  for (const gen of GENERATIONS) {
    const tab = document.createElement('div');
    tab.className = 'gen-tab'; tab.dataset.gen = gen.id; tab.textContent = `Gen ${gen.id}`;
    container.appendChild(tab);
  }
  container.addEventListener('click', e => {
    const tab = e.target.closest('.gen-tab'); if (!tab) return;
    activeGen = tab.dataset.gen === 'all' ? 'all' : parseInt(tab.dataset.gen);
    container.querySelectorAll('.gen-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active'); renderContent();
  });
}

// ─── FILTER ───
function getFiltered() {
  let list = allPokemon;
  if (activeGen !== 'all') list = list.filter(p => p.gen === activeGen);
  if (filterMissing) list = list.filter(p => !collected.has(p.id));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || (p.formLabel && p.formLabel.toLowerCase().includes(q)) || String(p.id).includes(q));
  }
  return list;
}

// ─── RENDER ───
function cardHTML(p) {
  const spriteUrl = p.sprite || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
  const numLabel  = !isNaN(p.id) ? `#${String(p.id).padStart(4,'0')}` : '';
  const hasTcg    = !!tcgCards[p.id];
  return `
    <div class="pokemon-card${collected.has(p.id)?' collected':''}${p.isForm?' form':''}" data-id="${p.id}">
      <img class="pokemon-img" src="${spriteUrl}" alt="${p.name}" loading="lazy"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>❓</text></svg>'">
      ${numLabel ? `<div class="pokemon-number">${numLabel}</div>` : ''}
      <div class="pokemon-name">${p.name}</div>
      ${p.formLabel ? `<div class="form-label">${p.formLabel}</div>` : ''}
      ${hasTcg ? `<div class="tcg-badge" title="Carta TCG guardada">🃏</div>` : ''}
    </div>`;
}

function renderContent() {
  const content  = document.getElementById('content');
  const filtered = getFiltered();
  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="ei">🔍</div><p>No se encontraron Pokémon</p></div>`;
    updateGlobalCount(); return;
  }
  const byGen = {};
  for (const p of filtered) {
    if (!byGen[p.gen]) byGen[p.gen] = { base:[], forms:[] };
    if (p.isForm) byGen[p.gen].forms.push(p); else byGen[p.gen].base.push(p);
  }
  let html = '';
  for (const gen of GENERATIONS) {
    if (!byGen[gen.id]) continue;
    const { base, forms } = byGen[gen.id];
    const all = [...base,...forms];
    const got = all.filter(p => collected.has(p.id)).length;
    const pct = all.length ? Math.round(got/all.length*100) : 0;
    html += `
      <div class="gen-section" data-gen="${gen.id}">
        <div class="gen-header">
          <div class="gen-title">${gen.name}<span>${gen.region}</span></div>
          <div class="gen-progress"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><span class="gen-count">${got}/${all.length}</span></div>
        </div>
        <div class="pokemon-grid">${base.map(p=>cardHTML(p)).join('')}</div>
        ${forms.length?`<div class="section-divider">✦ Formas alternativas</div><div class="pokemon-grid">${forms.map(p=>cardHTML(p)).join('')}</div>`:''}
      </div>`;
  }
  content.innerHTML = html;
  updateGlobalCount();
  attachCardClicks();
}

// ─── LONG PRESS ───
let lpTimer = null, lpFired = false;
const LP_MS = 480;

function attachCardClicks() {
  const content = document.getElementById('content');
  content.addEventListener('contextmenu', e => e.preventDefault());

  function startPress(card) {
    if (!card) return;
    lpFired = false;
    card.classList.add('pressing');
    const poke = allPokemon.find(p => p.id === card.dataset.id) || { id: card.dataset.id, name: `#${card.dataset.id}` };
    lpTimer = setTimeout(() => {
      lpFired = true;
      card.classList.remove('pressing');
      navigator.vibrate?.(25);
      openTcgFlow(poke);
    }, LP_MS);
  }
  function cancelPress(card) {
    clearTimeout(lpTimer);
    if (card) card.classList.remove('pressing');
  }

  content.addEventListener('touchstart',  e => startPress(e.target.closest('.pokemon-card')), { passive:true });
  content.addEventListener('touchend',    e => cancelPress(e.target.closest('.pokemon-card')), { passive:true });
  content.addEventListener('touchmove',   e => cancelPress(e.target.closest('.pokemon-card')), { passive:true });
  content.addEventListener('mousedown',   e => startPress(e.target.closest('.pokemon-card')));
  content.addEventListener('mouseup',     e => cancelPress(e.target.closest('.pokemon-card')));

  content.addEventListener('click', async e => {
    if (lpFired) { lpFired = false; return; }
    const card = e.target.closest('.pokemon-card'); if (!card) return;
    const id   = card.dataset.id;
    const poke = allPokemon.find(p => p.id === id);
    const name = poke ? (poke.formLabel ? `${poke.name} (${poke.formLabel})` : poke.name) : id;
    isLocalChange = true;
    if (collected.has(id)) {
      collected.delete(id); card.classList.remove('collected'); showToast(`${name} eliminado`);
    } else {
      collected.add(id); card.classList.add('collected'); showToast(`✓ ¡${name} capturado!`);
    }
    if (filterMissing && !collected.has(id)) card.remove();
    updateGlobalCount(); updateGenProgress(poke?.gen);
    await saveAll();
  });
}

// ─── TCG FLOW ───
function openTcgFlow(poke) {
  if (tcgCards[poke.id]) openCardView(poke);
  else openSelector(poke);
}

// ─── ① VISTA CARTA GUARDADA ───
let cvPoke = null;
function openCardView(poke) {
  cvPoke = poke;
  const saved   = tcgCards[poke.id];
  const overlay = document.getElementById('card-view-overlay');
  const cvImg   = document.getElementById('cv-img');
  const cvLoad  = document.getElementById('cv-loading');

  document.getElementById('cv-name').textContent = poke.formLabel ? `${poke.name} (${poke.formLabel})` : poke.name;
  document.getElementById('cv-set').textContent  = saved.setName ? `${saved.setName}${saved.localId?' · #'+saved.localId:''}` : '';

  cvImg.style.display  = 'none';
  cvLoad.style.display = 'flex';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  const img = new Image();
  img.onload  = () => { cvImg.src = img.src; cvImg.style.display=''; cvLoad.style.display='none'; };
  img.onerror = () => { cvLoad.style.display='none'; cvImg.src=''; cvImg.style.display=''; };
  img.src = saved.imageUrl;
}
function closeCardView() {
  document.getElementById('card-view-overlay').classList.remove('open');
  document.body.style.overflow = '';
  cvPoke = null;
}
document.getElementById('cv-btn-close').addEventListener('click', closeCardView);
document.getElementById('card-view-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('card-view-overlay')) closeCardView();
});
document.getElementById('cv-btn-change').addEventListener('click', () => {
  const poke = cvPoke; closeCardView();
  setTimeout(() => openSelector(poke), 80);
});
document.getElementById('cv-btn-remove').addEventListener('click', async () => {
  if (!cvPoke) return;
  const id = cvPoke.id;
  delete tcgCards[id];
  const gridCard = document.querySelector(`.pokemon-card[data-id="${CSS.escape(id)}"]`);
  gridCard?.querySelector('.tcg-badge')?.remove();
  isLocalChange = true; await saveAll();
  showToast('🃏 Carta eliminada'); closeCardView();
});

// ─── ② SELECTOR ───
let selPoke = null, selCards = [];
const tcgCache = {};

async function fetchTcgCards(name) {
  const key = name.toLowerCase();
  if (tcgCache[key] !== undefined) return tcgCache[key];
  try {
    const res = await fetch(`https://api.tcgdex.net/v2/en/cards?name=${encodeURIComponent(name)}&orderBy=releaseDate&order=DESC`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const cards = (Array.isArray(data)?data:[]).filter(c=>c.image);
    tcgCache[key] = cards; return cards;
  } catch { tcgCache[key]=[]; return []; }
}

async function openSelector(poke) {
  selPoke = poke;
  const overlay = document.getElementById('selector-overlay');
  const sheet   = document.getElementById('selector-sheet');
  const scroll  = document.getElementById('sheet-scroll');

  document.getElementById('sheet-poke-name').textContent = poke.formLabel ? `${poke.name} (${poke.formLabel})` : poke.name;
  scroll.innerHTML = `<div class="sheet-loading"><div class="sheet-dots"><div class="sheet-dot"></div><div class="sheet-dot"></div><div class="sheet-dot"></div></div>Buscando cartas TCG…</div>`;
  sheet.style.transform = ''; sheet.style.transition = '';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  selCards = await fetchTcgCards(poke.name);
  renderSelectorGrid(selCards);
}

function renderSelectorGrid(cards) {
  const scroll = document.getElementById('sheet-scroll');
  if (!cards.length) {
    scroll.innerHTML = `<div class="sheet-empty"><span>🃏</span>No se encontraron cartas TCG</div>`; return;
  }
  const savedId = tcgCards[selPoke?.id]?.cardId;
  let html = `<div class="sheet-section-label">${cards.length} carta${cards.length!==1?'s':''} disponibles</div><div class="tcg-grid">`;
  for (const card of cards) {
    const isSel  = card.id === savedId;
    const setName = card.set?.name || card.id || '';
    html += `<div class="tcg-tile-wrap">
      <div class="tcg-tile" data-card-id="${card.id}" style="${isSel?'border-color:var(--yellow-dark);':''}">
        <img data-src="${card.image}/high.webp" alt="${card.name||''}">
        ${isSel?'<div class="selected-check">✓</div>':''}
      </div>
      <div class="tcg-tile-label">${setName}</div>
    </div>`;
  }
  html += '</div>';
  scroll.innerHTML = html;

  scroll.querySelectorAll('.tcg-tile img[data-src]').forEach(img => {
    const i = new Image();
    i.onload  = () => { img.src = i.src; img.classList.add('loaded'); };
    i.onerror = () => img.classList.add('loaded');
    i.src = img.dataset.src;
  });
  scroll.querySelectorAll('.tcg-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const card = selCards.find(c => c.id === tile.dataset.cardId);
      if (card) openPreview(card);
    });
  });
}

function closeSelector() {
  const sheet   = document.getElementById('selector-sheet');
  const overlay = document.getElementById('selector-overlay');
  sheet.style.transition = 'transform 0.28s cubic-bezier(0.32,0.72,0,1)';
  sheet.style.transform  = 'translateY(100%)';
  setTimeout(() => {
    overlay.classList.remove('open');
    sheet.style.transform = ''; sheet.style.transition = '';
    document.body.style.overflow = '';
    selPoke = null;
  }, 280);
}
document.getElementById('sheet-close').addEventListener('click', closeSelector);
document.getElementById('selector-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('selector-overlay')) closeSelector();
});

// Swipe down to close
{
  const sheet = document.getElementById('selector-sheet');
  let sy = 0, swiping = false;
  sheet.addEventListener('touchstart', e => { sy = e.touches[0].clientY; swiping = false; }, { passive:true });
  sheet.addEventListener('touchmove',  e => {
    const dy = e.touches[0].clientY - sy;
    const sc = document.getElementById('sheet-scroll');
    if (dy > 10 && sc.scrollTop <= 0) {
      swiping = true;
      sheet.style.transition = 'none';
      sheet.style.transform  = `translateY(${dy * 0.55}px)`;
    }
  }, { passive:true });
  sheet.addEventListener('touchend', e => {
    if (!swiping) return;
    const dy = e.changedTouches[0].clientY - sy;
    sheet.style.transition = ''; sheet.style.transform = '';
    if (dy > 90) closeSelector();
    swiping = false;
  }, { passive:true });
}

// ─── ③ PREVIEW CARTA ───
let pvCard = null;
function openPreview(card) {
  pvCard = card;
  const setName = card.set?.name || '';
  const num     = card.localId   || '';
  document.getElementById('pv-set').textContent = [setName, num?`#${num}`:''].filter(Boolean).join(' · ');
  document.getElementById('pv-img').src = card.image + '/high.webp';
  document.getElementById('preview-overlay').classList.add('open');
}
function closePreview() {
  document.getElementById('preview-overlay').classList.remove('open');
  pvCard = null;
}
document.getElementById('pv-btn-back').addEventListener('click', closePreview);
document.getElementById('preview-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('preview-overlay')) closePreview();
});
document.getElementById('pv-btn-select').addEventListener('click', async () => {
  if (!pvCard || !selPoke) return;
  const card = pvCard, poke = selPoke;

  tcgCards[poke.id] = {
    cardId:   card.id,
    imageUrl: card.image + '/high.webp',
    setName:  card.set?.name  || '',
    localId:  card.localId    || '',
  };

  // Actualizar badge en grid sin re-renderizar
  const gridCard = document.querySelector(`.pokemon-card[data-id="${CSS.escape(poke.id)}"]`);
  if (gridCard && !gridCard.querySelector('.tcg-badge')) {
    const badge = document.createElement('div');
    badge.className = 'tcg-badge'; badge.title = 'Carta TCG guardada'; badge.textContent = '🃏';
    gridCard.appendChild(badge);
  }

  isLocalChange = true; await saveAll();
  showToast('🃏 ¡Carta guardada!');
  closePreview(); closeSelector();
});

// ─── PROGRESS ───
function updateGlobalCount() {
  const got = allPokemon.filter(p => collected.has(p.id)).length;
  document.getElementById('global-count').textContent = `${got} / ${allPokemon.length}`;
}
function updateGenProgress(genId) {
  if (!genId) return;
  const section = document.querySelector(`.gen-section[data-gen="${genId}"]`); if (!section) return;
  const cards   = section.querySelectorAll('.pokemon-card');
  const got     = section.querySelectorAll('.pokemon-card.collected').length;
  const pct     = cards.length ? Math.round(got/cards.length*100) : 0;
  const fill    = section.querySelector('.progress-fill');
  const cnt     = section.querySelector('.gen-count');
  if (fill) fill.style.width = pct + '%';
  if (cnt)  cnt.textContent  = `${got}/${cards.length}`;
}
function updateAllGenProgress() { for (const g of GENERATIONS) updateGenProgress(g.id); }

// ─── SEARCH & FILTERS ───
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (searchQuery) {
    activeGen = 'all';
    document.querySelectorAll('.gen-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.gen-tab[data-gen="all"]')?.classList.add('active');
  }
  renderContent();
});
document.getElementById('btn-missing').addEventListener('click', e => {
  filterMissing = !filterMissing; e.target.classList.toggle('active', filterMissing); renderContent();
});
document.getElementById('btn-mark-all').addEventListener('click', async e => {
  const filtered  = getFiltered();
  const allMarked = filtered.every(p => collected.has(p.id));
  if (allMarked) { filtered.forEach(p => collected.delete(p.id)); showToast(`${filtered.length} Pokémon desmarcados`); e.target.textContent='✓ Todos'; }
  else           { filtered.forEach(p => collected.add(p.id));    showToast(`✓ ${filtered.length} Pokémon marcados`); e.target.textContent='✗ Ninguno'; }
  isLocalChange = true; renderContent(); await saveAll();
});

// ─── FIRST-VISIT HINT ───
function showHintIfFirst() {
  const KEY = 'pokedex_tcg_hint_v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  const h = document.createElement('div');
  h.className = 'press-hint';
  h.textContent = '💡 Mantén pulsado para guardar su carta TCG';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}

// ─── INIT ───
async function init() {
  try { nameCache = JSON.parse(localStorage.getItem(NAMES_KEY) || '{}'); } catch {}
  try {
    const snap = await getDoc(colRef);
    if (snap.exists()) { const d = snap.data(); collected = new Set(d.ids||[]); loadTcgFromSnap(d); }
  } catch(e) { console.error(e); setSyncState('error'); }

  buildPokemonList(); buildGenTabs(); renderContent();
  startListener(); setSyncState('ok');
  showHintIfFirst();

  const missing = allPokemon.filter(p => !p.isForm && !nameCache[p.id]).map(p => parseInt(p.id)).filter(Boolean);
  if (missing.length > 0) {
    const BATCH = 15;
    for (let i = 0; i < missing.length; i += BATCH) {
      const batch = missing.slice(i, i+BATCH);
      await Promise.all(batch.map(async id => {
        const name = await fetchName(id); nameCache[id] = name;
        const entry = allPokemon.find(p => p.id === String(id)); if (entry) entry.name = name;
        const el = document.querySelector(`.pokemon-card[data-id="${id}"] .pokemon-name`); if (el) el.textContent = name;
      }));
      localStorage.setItem(NAMES_KEY, JSON.stringify(nameCache));
    }
  }
}

init();
</script>
